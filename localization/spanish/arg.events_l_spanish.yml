 # GUERRA GRANDE (Uruguay) — Journal Entry
 # =================================================
 je_guerra_grande: "La Guerra Grande"
 je_guerra_grande_reason: "@information! Durante la [concept_guerilla_war|l], las victorias no concederán puntos de ocupación, sino que ambos bandos acumularán puntos por cada batalla ganada y recibirán un modificador positivo al inicio de la #b fase de intervención extranjera#!, cuya fuerza depende de la puntuación obtenida respectivamente durante la $concept_guerilla_war$. #b Tras esto, la $concept_guerilla_war$ se transformará en una guerra convencional#!.\n$TOOLTIP_DELIMITER$La rivalidad entre #b colorados#! y #b blancos#! ha desembocado en una guerra civil abierta. Montevideo resiste como bastión del gobierno, mientras que los caudillos del interior dominan la campaña. Las potencias vecinas observan de cerca, dispuestas a intervenir si el conflicto se inclina a su favor."
 je_guerra_grande_status_skirmish: "El conflicto está en la fase de [concept_guerilla_war|l]"
 je_guerra_grande_status_foreign_influence: "¡Las potencias extranjeras están interviniendo!"
 je_guerra_grande_complete: "Ha vencido en la Guerra Grande"

 # =================================================
 # GUERRA GRANDE — Progress Bar
 # =================================================
 je_guerra_grande_score_bar: "Fase de guerrillas"
 je_guerra_grande_score_bar_desc: "Puntuación de los colorados: [GetGlobalVariable('uru_guerra_grande_score').GetValue|v0]"
 je_guerra_grande_score_bar_second_desc: "Puntuación de los blancos: [GetGlobalVariable('ubl_guerra_grande_score').GetValue|v0]"

 # =================================================
 # GUERRA GRANDE — Scripted Buttons
 # =================================================
 je_guerra_grande_foreign_influence_button: "Buscar apoyo extranjero"
 je_guerra_grande_foreign_influence_button_desc: "La situación de nuestras fuerzas es insostenible: cada día que pasa, el enemigo se hace más fuerte. Brasil y Argentina observan el conflicto de cerca; asegurar su respaldo podría inclinarnos la balanza, aunque no saldrá gratis."

 je_guerra_grande_flush_them_out_button: "Acorralarlos"
 je_guerra_grande_flush_them_out_button_desc: "El impulso de los rebeldes se ha visto interrumpido y ha llegado la hora de pasar al ataque."

 # =================================================
 # GUERRA GRANDE — Modifiers
 # =================================================
 guerra_grande_guerilla_warfare: "Guerra de guerrillas"
 guerra_grande_colorado_reward: "Autoridad asegurada"
 guerra_grande_blanco_reward: "Poder del interior consolidado"

 blanco_last_stand: "Última resistencia blanca"
 colorado_galvanized_forces: "Fuerzas coloradas galvanizadas"

 siege_of_montevideo: "Sitio de Montevideo"
 blanco_raids: "Incursiones blancas"
 blanco_raiding_expenses: "Gastos de incursiones"
 blanco_interior_autonomy: "Autonomía del interior"

 brazilian_support: "Apoyo brasileño"
 argentine_support: "Apoyo argentino"

 # =================================================
 # GUERRA GRANDE — Events
 # =================================================
 guerra_grande.1.t: "Escalada de la intervención extranjera"
 guerra_grande.1.d: "La guerra civil ha atraído la atención de las potencias vecinas. Diplomáticos y agentes se multiplican, y ambos bandos buscan respaldo externo."
 guerra_grande.1.f: "En el puerto se descargan cajas y promesas. Algunas llevan municiones; otras, cadenas."
 guerra_grande.1.a: "¡Por la República!"
 guerra_grande.1.a.ubl: "¡Por el interior!"

 guerra_grande.2.t_colorado: "Victoria del gobierno"
 guerra_grande.2.t_blanco: "Triunfo blanco"
 guerra_grande.2.d_colorado: "Con las fuerzas rebeldes dispersas y el orden restablecido, el gobierno sale victorioso. Montevideo permanece como centro incuestionable del poder."
 guerra_grande.2.d_blanco: "El gobierno ha caído y el interior impone su ley. Termina la era de la dominación urbana."
 guerra_grande.2.f_colorado: "Las calles se llenan de soldados agotados, estandartes raídos y celebraciones contenidas."
 guerra_grande.2.f_blanco: "Los caudillos entran en la capital; su victoria anuncia un nuevo orden político."
 guerra_grande.2.a: "Sin un instante de pausa."

 guerra_grande.3.t: "Reclamos del interior"
 guerra_grande.3.d: "Los jefes locales del interior exigen mayores atribuciones a cambio de su lealtad."
 guerra_grande.3.f: "Llegan emisarios a caballo: traen cartas selladas y amenazas que no hace falta escribir."
 guerra_grande.3.a: "Conceder privilegios locales."
 guerra_grande.3.b: "Rechazar sus exigencias."

 guerra_grande.4.t: "Presión extranjera"
 guerra_grande.4.d: "Brasil y Argentina buscan influir en el desenlace del conflicto. Ofrecen ayuda a cambio de futuras concesiones."
 guerra_grande.4.f: "Los diplomáticos sonríen mientras los generales afilan el cuchillo."
 guerra_grande.4.a: "Aceptar el respaldo de Brasil."
 guerra_grande.4.b: "Buscar apoyo argentino."
 guerra_grande.4.c: "Rechazar toda injerencia."

 guerra_grande.5.t: "El sitio de Montevideo"
 guerra_grande.5.d: "Tomar Montevideo asestaría un golpe decisivo al gobierno y abriría rutas de suministro vitales."
 guerra_grande.5.f: "«Si cae la capital, termina la guerra»."
 guerra_grande.5.a: "¡Preparad los cañones!"
 guerra_grande.5.b: "No podemos permitirnos otro asedio."

 guerra_grande.6.t: "Incursiones en la campaña"
 guerra_grande.6.d: "Las fuerzas irregulares atacan depósitos, caminos y suministros en el interior."
 guerra_grande.6.f: "«Aparecen en la llanura y desaparecen antes de que suene el último disparo»."
 guerra_grande.6.a: "Enviar un destacamento para provocar el caos."
 guerra_grande.6.b: "Esto es una pérdida de tiempo. No tenemos aliados aquí."

 guerra_grande.7.t: "La Guerra Grande"
 guerra_grande.7.d: "La división política ha estallado en guerra abierta. Uruguay se parte entre ciudad y campaña."
 guerra_grande.7.f: "Hogueras dispersas iluminan la llanura mientras se reúnen las milicias para lo que viene."
 guerra_grande.7.a: "El destino del país se decidirá en estos campos."
 guerra_grande_startup_tt: "@information! La Guerra Grande comienza como una [concept_guerilla_war|l]"

