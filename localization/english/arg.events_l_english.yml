 je_guerra_grande: "The Guerra Grande"
 je_guerra_grande_reason: "@information! During the [concept_guerilla_war], victories will not grant Occupation Score and instead both sides will accrue a score for each victorious battle, receiving a positive modifier upon the start of the #b Foreign Intervention Phase#!, the strength of which depends on the score achieved during the $concept_guerilla_war$ respectively. #b After which the $concept_guerilla_war$ will transform into a regular war#!.\n$TOOLTIP_DELIMITER$\nPolitical rivalry between the #b Colorados#! and #b Blancos#! has erupted into open civil war. Montevideo remains the stronghold of the government, while rural caudillos dominate the countryside. Foreign powers observe closely, ready to intervene should the conflict tip in their favor."

 je_guerra_grande_status_skirmish: "The war is in the [concept_guerilla_war] Phase"
 je_guerra_grande_status_foreign_influence: "Foreign Powers are intervening!"
 je_guerra_grande_complete: "Has won the Guerra Grande"

