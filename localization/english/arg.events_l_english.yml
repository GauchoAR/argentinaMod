 argentine_support: "Argentine Support"

# =================================================
# Events
# =================================================

 guerra_grande.1.t: "Foreign Intervention Escalates"
 guerra_grande.1.d: "The civil war has drawn the attention of neighboring powers. Diplomats and agents flood into the region as both sides seek external backing."
 guerra_grande.1.f: "Ships anchored in the harbor carry more than goods — they bring advisors, weapons, and promises of influence."
 guerra_grande.1.a: "For the Republic!"
 guerra_grande.1.a.ubl: "For the Interior!"

 guerra_grande.2.t_colorado: "Government Victory"
 guerra_grande.2.t_blanco: "Blanco Triumph"

 guerra_grande.2.d_colorado: "With the rebel forces scattered and order restored, the government emerges victorious. Montevideo stands unchallenged as the center of power."
 guerra_grande.2.d_blanco: "The government has fallen and the countryside now rules the Republic. The era of urban dominance has ended."

 guerra_grande.2.f_colorado: "The streets are filled with exhausted soldiers, battered banners, and weary celebrations."
 guerra_grande.2.f_blanco: "Caudillos ride into the capital, their banners marking a new political order."

 guerra_grande.2.a: "A new chapter begins."

 guerra_grande.3.t: "Autonomy Demands of the Interior"
 guerra_grande.3.d: "Local leaders in the countryside demand greater autonomy in exchange for continued loyalty."
 guerra_grande.3.f: "Messengers arrive on horseback, carrying letters sealed with wax and threats unspoken."
 guerra_grande.3.a: "Grant local privileges."
 guerra_grande.3.b: "Reject their demands."

 guerra_grande.4.t: "Foreign Pressure"
 guerra_grande.4.d: "Brazil and Argentina both seek influence over the conflict, offering aid in exchange for future leverage."
 guerra_grande.4.f: "Diplomats smile while generals sharpen their knives."
 guerra_grande.4.a: "Accept Brazilian backing."
 guerra_grande.4.b: "Seek Argentine support."
 guerra_grande.4.c: "Reject all interference."

 guerra_grande.5.t: "The Siege of Montevideo"
 guerra_grande.5.d: "Control of Montevideo would cripple the government and open vital supply routes."
 guerra_grande.5.f: "\"If the capital falls, the war ends.\""
 guerra_grande.5.a: "Begin the bombardment."

 guerra_grande.6.t: "Raids in the Countryside"
 guerra_grande.6.d: "Irregular forces strike supply depots and infrastructure throughout rural Uruguay."
 guerra_grande.6.f: "\"They melt into the plains as quickly as they appear.\""
 guerra_grande.6.a: "Expand the raids."
 guerra_grande.6.b: "Call them back."

 guerra_grande.7.t: "The Guerra Grande"
 guerra_grande.7.d: "Political division has erupted into open war. Uruguay now stands divided between city and countryside."
 guerra_grande.7.f: "Campfires burn across the plains as militias assemble for the coming struggle."
 guerra_grande.7.a: "Uruguay's fate will be decided in blood."

 guerra_grande_startup_tt: "@information! The Guerra Grande begins as a [concept_guerilla_war]"

